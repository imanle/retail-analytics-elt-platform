version: '3.9'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    PYTHONPATH: /opt/airflow/scripts
    POSTGRES_HOST: postgres
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    MINIO_BUCKET: ${MINIO_BUCKET}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./raw_data:/opt/airflow/raw_data
    - ./archive:/opt/airflow/archive
    - ./dbt:/opt/airflow/dbt
    - ./airflow/requirements.txt:/requirements.txt
  depends_on:
    - postgres
    - minio

services:

  postgres:
    image: postgres:15
    container_name: retail_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: retail_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      bash -c "
        sleep 5 &&
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/raw_data/orders &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/raw_data/order_items &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/raw_data/customers &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/raw_data/products &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/raw_data/shipments &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/raw_data/payments &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/archive/loaded &&
        mc mb --ignore-existing local/$$MINIO_BUCKET/archive/failed &&
        echo 'MinIO buckets created successfully.'
      "

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: >
      bash -c "
        airflow db init &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
      "
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    command: bash -c "pip install -r /requirements.txt && airflow webserver"

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: always
    command: bash -c "pip install -r /requirements.txt && airflow scheduler"

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data: