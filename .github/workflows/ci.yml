name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Job 1: Code quality — linting
  # -------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check scripts/ tests/

      - name: Run ruff formatter check
        run: ruff format --check scripts/ tests/

  # -------------------------------------------------------------------
  # Job 2: Unit tests
  # -------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: |
          pytest tests/ \
            --tb=short \
            --cov=scripts \
            --cov-report=term-missing \
            -v

  # -------------------------------------------------------------------
  # Job 3: dbt checks
  # -------------------------------------------------------------------
  dbt-checks:
    name: dbt Checks
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-postgres==1.8.0

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile
        working-directory: dbt
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: dummy
          POSTGRES_DB: retail_warehouse
        run: dbt compile --profiles-dir .

  # -------------------------------------------------------------------
  # Job 4: Docker Compose validation
  # -------------------------------------------------------------------
  docker-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env for validation
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${{ secrets.AIRFLOW__DATABASE__SQL_ALCHEMY_CONN }}" >> .env
          echo "AIRFLOW_UID=${{ secrets.AIRFLOW_UID }}" >> .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet