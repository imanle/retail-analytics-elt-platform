version: 2

models:
  - name: fact_orders
    description: "One row per order with payment, shipment, and item summary"
    columns:
      - name: order_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: total_amount
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - accepted_values:
                  config:
                    values: ['completed', 'cancelled', 'refunded', 'pending']

  - name: fact_order_items
    description: "One row per order item with estimated profit"
    columns:
      - name: order_item_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null

  - name: fact_daily_sales
    description: "Aggregated sales metrics per day"
    columns:
      - name: order_date
        description: "Primary key"
        data_tests:
          - unique
          - not_null

  - name: fact_customer_revenue
    description: "Revenue and order stats per customer"
    columns:
      - name: customer_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null

  - name: fact_shipping_performance
    description: "Shipment details with late delivery flag"
    columns:
      - name: shipment_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null

  - name: dim_customers
    description: "Customer dimension with segment and order history"
    columns:
      - name: customer_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension with margin"
    columns:
      - name: product_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null
